<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>ROM SCRAPER</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/theme.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/log.css">
<link rel="stylesheet" href="styles/animations.css">
</head>
<body>

<!-- ═══ Titlebar ═══ -->
<div class="titlebar">
  <div class="tb-wm">
    <button class="wm-btn wm-close" id="btnClose"></button>
    <button class="wm-btn wm-min" id="btnMin"></button>
    <button class="wm-btn wm-max" id="btnMax"></button>
  </div>
  <div class="tb-divider"></div>
  <div class="tb-brand">
    <div class="tb-logo">RS</div>
    <div>
      <div class="tb-name">ROM SCRAPER</div>
      <div class="tb-sub">Ryan's Outdoor Media</div>
    </div>
  </div>
  <div class="tb-center" id="tbVersion">v1.0.8 -- AFJORD</div>
  <div class="tb-actions">
    <button class="tb-btn" id="tbOpenFolder" title="Open output folder">OPEN FOLDER</button>
  </div>
</div>

<!-- ═══ App Shell ═══ -->
<div class="app-shell">
  <div class="nav-sidebar" id="navSidebar"></div>
  <div class="page-root" id="pageRoot"></div>
</div>

<!-- ═══ Status Bar ═══ -->
<div class="statusbar">
  <div class="status-dot" id="statusDot"></div>
  <div class="status-txt" id="statusTxt">IDLE</div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
  <div class="stat-chip"><span class="sv" id="statFound">0</span><span class="sl">Found</span></div>
  <div class="stat-chip"><span class="sv green" id="statDL">0</span><span class="sl">Downloaded</span></div>
  <div class="stat-chip"><span class="sv red" id="statErr">0</span><span class="sl">Errors</span></div>
  <div class="stat-chip"><span class="sv" id="statSize">0 B</span><span class="sl">Total Size</span></div>
  <div class="stat-chip"><span class="sv" id="statElapsed">00:00</span><span class="sl">Elapsed</span></div>
</div>

<!-- ═══ Components (load order matters) ═══ -->
<script src="js/components/activity-log.js"></script>
<script src="js/components/progress-ring.js"></script>
<script src="js/components/results-table.js"></script>
<script src="js/components/module-card.js"></script>
<script src="js/components/sidebar.js"></script>

<!-- ═══ Pages ═══ -->
<script src="js/pages/scraper.js"></script>
<script src="js/pages/settings.js"></script>
<script src="js/pages/instructions.js"></script>

<!-- ═══ App Init ═══ -->
<script src="js/app.js"></script>

<!-- ═══ Titlebar button wiring ═══ -->
<script>
document.getElementById('btnClose').addEventListener('click', () => window.romAPI.close());
document.getElementById('btnMin').addEventListener('click', () => window.romAPI.minimize());
document.getElementById('btnMax').addEventListener('click', () => window.romAPI.maximize());
document.getElementById('tbOpenFolder').addEventListener('click', () => {
  if (window.ScraperPage) window.ScraperPage.openOutputFolder();
});
</script>

</body>
</html>
